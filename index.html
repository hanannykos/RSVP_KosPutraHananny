<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Overwrite WebSocket for Vite HMR connection to prevent benign connection error logs in development
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (!OriginalWebSocket) return;
        
        window.WebSocket = function(url, protocols) {
          const isViteHMR = typeof url === 'string' && (
            url.includes('/vite') || 
            url.includes('localhost') || 
            url.includes('127.0.0.1') || 
            url.includes(window.location.host)
          );
          
          if (isViteHMR) {
            // Return a safe, fully compliant dummy WebSocket object to silence warnings
            const mockWS = {
              url: url,
              readyState: 1, // OPEN
              send: function() {},
              close: function() {
                this.readyState = 3; // CLOSED
                if (typeof this.onclose === 'function') {
                  this.onclose({ code: 1000, reason: "Mock closed gracefully", wasClean: true });
                }
              },
              addEventListener: function(event, callback) {
                if (event === 'close') this.onclose = callback;
                if (event === 'error') this.onerror = callback;
                if (event === 'message') this.onmessage = callback;
                if (event === 'open') {
                  this.onopen = callback;
                  setTimeout(() => {
                    if (typeof this.onopen === 'function') {
                      this.onopen({ type: 'open' });
                    }
                  }, 50);
                }
              },
              removeEventListener: function() {},
              dispatchEvent: function() { return true; }
            };
            return mockWS;
          }
          return new OriginalWebSocket(url, protocols);
        };
        
        window.WebSocket.CONNECTING = 0;
        window.WebSocket.OPEN = 1;
        window.WebSocket.CLOSING = 2;
        window.WebSocket.CLOSED = 3;
        window.WebSocket.prototype = OriginalWebSocket.prototype;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
